<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            text-align:center;
        }

        input{
            width:70%;
            padding:10px;
        }

        button{
            padding:10px;
            background:darkblue;
            color:white;
            border:none;
            cursor:pointer;
        }

        li{
            margin-top:10px;
            padding:10px;
            background:#eee;
            display:flex;
            justify-content:space-between;
        }

        .delete-btn{
            background:red;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>To-Do App</h1>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

</div>

<script>

async function loadTasks(){

    let response = await fetch("http://127.0.0.1:5000/tasks");

    let tasks = await response.json();

    let taskList = document.getElementById("taskList");

    taskList.innerHTML = "";

    tasks.forEach((task,index)=>{

        taskList.innerHTML += `
            <li>
                ${task}
                <button class="delete-btn"
                onclick="deleteTask(${index})">
                Delete
                </button>
            </li>
        `;
    });
}

async function addTask(){

    let task = document.getElementById("taskInput").value;

    await fetch("http://127.0.0.1:5000/add",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            task:task
        })
    });

    document.getElementById("taskInput").value="";

    loadTasks();
}

async function deleteTask(index){

    await fetch("http://127.0.0.1:5000/delete",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            index:index
        })
    });

    loadTasks();
}

loadTasks();

</script>

</body>
</html>
